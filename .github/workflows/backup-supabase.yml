name: Backup Supabase Database

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to backup (dev, staging, prod)'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
       
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest
       
      - name: Get DB URL for dev
        if: github.event.inputs.environment == 'dev'
        run: |
          echo "DB_URL=${{ secrets.DB_URL_DEV }}" >> $GITHUB_ENV
          echo "ENVIRONMENT=dev" >> $GITHUB_ENV
       
      - name: Get DB URL for staging
        if: github.event.inputs.environment == 'staging'
        run: |
          echo "DB_URL=${{ secrets.DB_URL_STAGING }}" >> $GITHUB_ENV
          echo "ENVIRONMENT=staging" >> $GITHUB_ENV
       
      - name: Get DB URL for prod
        if: github.event.inputs.environment == 'prod'
        run: |
          echo "DB_URL=${{ secrets.DB_URL_PROD }}" >> $GITHUB_ENV
          echo "ENVIRONMENT=prod" >> $GITHUB_ENV
       
      - name: Validate DB URL
        run: |
          if [[ -z "$DB_URL" ]]; then
            echo "Error: DB_URL secret not configured for ${{ github.event.inputs.environment }}"
            exit 1
          fi
          echo "Backup environment: $ENVIRONMENT"
       
      - name: Create backup directories
        run: mkdir -p backups/$ENVIRONMENT
       
      - name: Backup roles
        run: |
          supabase db dump --db-url "$DB_URL" -f backups/$ENVIRONMENT/roles.sql --role-only
       
      - name: Backup schema
        run: |
          supabase db dump --db-url "$DB_URL" -f backups/$ENVIRONMENT/schema.sql
       
      - name: Backup data
        run: |
          supabase db dump --db-url "$DB_URL" -f backups/$ENVIRONMENT/data.sql --data-only --use-copy
       
      - name: Create metadata file
        run: |
          echo '{"environment": "$ENVIRONMENT", "backup_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)", "workflow_run": "${{ github.run_id }}"}' > backups/$ENVIRONMENT/metadata.json
       
      - name: Upload backup artifacts
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ env.ENVIRONMENT }}
          path: backups/${{ env.ENVIRONMENT }}/
          retention-days: 7
       
      - name: Commit backup files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Backup: Supabase ${{ env.ENVIRONMENT }} database $(date -u +%Y-%m-%d)"
          file_pattern: backups/${{ env.ENVIRONMENT }}/*
          commit_user_name: GitHub Actions
          commit_user_email: actions@github.com
       
      - name: Summary
        run: |
          echo "## Backup Complete" >> $GITHUB_STEP_SUMMARY
          echo "Environment: $ENVIRONMENT" >> $GITHUB_STEP_SUMMARY
