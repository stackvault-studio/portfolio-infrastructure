name: Backup All Supabase Databases

on:
  #schedule:
    #- cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:

jobs:
  backup-dev:
    uses: ./.github/workflows/backup-supabase.yml
    secrets:
      DB_URL: ${{ secrets.DB_URL_DEV }}
  
  backup-staging:
    uses: ./.github/workflows/backup-supabase.yml
    secrets:
      DB_URL: ${{ secrets.DB_URL_STAGING }}
  
  backup-prod:
    uses: ./.github/workflows/backup-supabase.yml
    secrets:
      DB_URL: ${{ secrets.DB_URL_PROD }}
