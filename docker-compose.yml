services:
  backend:
    image: ${BACKEND_IMAGE:-ossemaabd95/stackvault}:${BACKEND_TAG}
    container_name: portfolio-backend-${ENVIRONMENT}
    environment:
      - ENVIRONMENT=${ENVIRONMENT}
      - SPRING_PROFILES_ACTIVE=${ENVIRONMENT}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://${DB_HOST:-postgres}:${DB_PORT:-5432}/${DB_NAME:-postgres}
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-postgres}
      - SERVER_PORT=8081
    ports:
      - "${BACKEND_PORT:-8081}:8081"
    networks:
      - app-network
    restart: unless-stopped

  front:
    image: ${FRONT_IMAGE:-ossemaabd95/stackvault}:${FRONT_TAG}
    container_name: portfolio-front-${ENVIRONMENT}
    environment:
      - ENVIRONMENT=${ENVIRONMENT}
      - VITE_SUPABASE_URL=${SUPABASE_URL:-}
      - VITE_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-}
    ports:
      - "${FRONT_PORT:-80}:80"
    networks:
      - app-network
    restart: unless-stopped
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    container_name: portfolio-postgres-${ENVIRONMENT}
    profiles:
      - local-local
    environment:
      - POSTGRES_USER=${DB_USERNAME:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-postgres}
    ports:
      - "${DB_EXTERNAL_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data: