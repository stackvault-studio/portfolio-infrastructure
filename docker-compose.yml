services:
  nginx:
    image: nginx:alpine
    container_name: portfolio-nginx-${ENVIRONMENT}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    networks:
      - app-network
    restart: unless-stopped
    depends_on:
      - front
      - backend

  backend:
    image: ${BACKEND_IMAGE:-ossemaabd95/stackvault}:${BACKEND_TAG}
    container_name: portfolio-backend-${ENVIRONMENT}
    environment:
      - ENVIRONMENT=${ENVIRONMENT}
      - SPRING_PROFILES_ACTIVE=${ENVIRONMENT}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://${DB_HOST:-postgres}:${DB_PORT:-5432}/${DB_NAME:-postgres}
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-postgres}
      - SERVER_PORT=8081
    expose:
      - "8081"
    networks:
      - app-network
    restart: unless-stopped

  front:
    image: ${FRONT_IMAGE:-ossemaabd95/stackvault}:${FRONT_TAG}
    container_name: portfolio-front-${ENVIRONMENT}
    environment:
      - ENVIRONMENT=${ENVIRONMENT}
    expose:
      - "80"
    networks:
      - app-network
    restart: unless-stopped
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    container_name: portfolio-postgres-${ENVIRONMENT}
    profiles:
      - local-local
    environment:
      - POSTGRES_USER=${DB_USERNAME:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-postgres}
    ports:
      - "${DB_EXTERNAL_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data: